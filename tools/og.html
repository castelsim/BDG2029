<!doctype html>
<html lang="it"><head><meta charset="utf-8"><style>
  body { margin: 0; width: 1200px; height: 630px; background: #050506;
         display: flex; align-items: center; justify-content: center; gap: 70px;
         font-family: "Iowan Old Style", Palatino, Georgia, serif; color: #ede7dc; }
  .anello { width: 300px; height: 300px; border-radius: 50%;
            border: 10px solid #26262a; position: relative; flex: none; }
  .anello::before { content: ""; position: absolute; inset: -10px; border-radius: 50%;
            border: 10px solid transparent;
            border-top-color: #ffb25e; border-right-color: #ffb25e; border-bottom-color: #ffb25e;
            transform: rotate(45deg);
            filter: drop-shadow(0 0 26px rgba(255, 178, 94, 0.8)); }
  h1 { font-size: 84px; font-weight: 500; line-height: 1.05; margin: 0 0 24px; }
  p  { font-size: 30px; font-style: italic; color: #ffe8c8; margin: 0; max-width: 560px; }
  small { display: block; margin-top: 30px; font-family: Menlo, monospace;
          font-size: 19px; color: #a89f90; letter-spacing: 3px; }
</style></head><body>
  <div class="anello"></div>
  <div><h1>Il Battito<br>di Bitcoin</h1>
    <p>Migliaia di scambi reali nel mondo, trasformati in suono e luce. In diretta.</p>
    <small>SIMONECASTELLAN.COM/BDG2029</small></div>
</body></html>
